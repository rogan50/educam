    <div id="quiz">

        <!--progress bar-->
             <progress id="stepProgress" value="1" max="10"></progress>
        <p id="stepText">Question 1 of 10</p>

        <p class="qstn">Question:</p>
        <p id="question">Question</p>

        <button class="btn" onclick="checkAnswer('A')">A</button>
        <button class="btn" onclick="checkAnswer('B')">B</button>
        <button class="btn" onclick="checkAnswer('C')">C</button>

           <script>

let questions = [
    {
        question: "A database is a collection of?",
        correct: "B",
        options: {
            A: "Random data",
            B: "Related data organized for easy access and management",
            C: "Unrelated files",
            D: "Computer programs"
        }
    },
    {
        question: "The main purpose of a database system is to?",
        correct: "A",
        options: {
            A: "Store and manage data efficiently",
            B: "Delete information permanently",
            C: "Design computer hardware",
            D: "Make games"
        }  
    },
     {
        question: "A program that manages and controls access to a database is called a?",
        correct: "A",
        options: {
            A: "DBMS (Database Management System)",
            B: "Operating System",
            C: "Spreadsheet",
            D: "Compiler"
        }
    },
     {
        question: "Which of the following is Not a database software?",
        correct: "D",
        options: {
            A: "Microsoft Access",
            B: "MySQL",
            C: "Oracle",
            D: "Adobe Photoshop"
        }
    },
     {
        question: "A record in a database is a collection of related?",
        correct: "B",
        options: {
            A: "Tables",
            B: "Fields",
            C: "Files",
            D: "Keys"
        }
    },
     {
        question: "A field in a database refers to ?",
        correct: "D",
        options: {
            A: "A row of unrelated information",
            B: "A folder",
            C: "A program",
            D: "AA column that stores a specific type of data"
        }
    },
     {
        question: "The smallest unit of data in a database is called a?",
        correct: "D",
        options: {
            A: "File",
            B: "Bit",
            C: "Field",
            D: "Character"
        }
    },
     {
        question: "Which of the following best defines a table in a database?",
        correct: "B",
        options: {
            A: "A collection of unrelated data",
            B: "A collection of records arranged in rows and columns",
            C: "A program that edits images",
            D: "A storage device"
        }
    },
     {
        question: "In a database table, a row represents a?",
        correct: "A",
        options: {
            A: "Record",
            B: "Field",
            C: "File",
            D: "Database"
        }
    },
     {
        question: "A primary key is used to?",
        correct: "B",
        options: {
            A: "Delet records",
            B: "Uniquely identify each record in a table",
            C: "Sort records alphabetically",
            D: "Create tables"
        }
    },
     {
        question: "Which of these can be used as a primary key?",
        correct: "B",
        options: {
            A: "Name",
            B: "Student ID",
            C: "Age",
            D: "Gender"
        }
    },
     {
        question: "A foreign key in a database is used to?",
        correct: "A",
        options: {
            A: "Link tables together",
            B: "Delete a record",
            C: "Create a new table",
            D: "Sort data"
        }
    },
 {
        question: "The process of removing duplicate data from a database is called?",
        correct: "A",
        options: {
            A: "Normalization",
            B: "Duplication",
            C: "Compilation",
            D: "Summarization"
        }
    },
     {
        question: "A query in a database is used to?",
        correct: "D",
        options: {
            A: "Delete all records",
            B: "Format the table",
            C: "Close the database",
            D: "Ask questions or extract specific information from a database"
        }
    },
 {
        question: "The process of designing a database structure is called?",
        correct: "C",
        options: {
            A: "Formatting",
            B: "Querying",
            C: "Database design",
            D: "Programming"
        }
    },
 {
        question: "One advantage of a database system is that it?",
        correct: "A",
        options: {
            A: "Allows easy access and data sharing",
            B: "Increases data duplication",
            C: "Makes data retrieval difficult",
            D: "Wastes storage space"
        }
    }


     
];

let current = 0;
let score = 0;

//show first question
showQuestion();

function showQuestion() {
    let q = questions[current];

    document.getElementById("question").innerText = q.question;

    //show answer texts inside buttons
    let buttons =
    document.getElementsByClassName("btn");
    buttons[0].innerText = "A. " +
    q.options.A;
     buttons[1].innerText = "B. " +
    q.options.B;
     buttons[2].innerText = "C. " +
    q.options.C;
     buttons[3].innerText = "D. " +
    q.options.B;

    document.getElementById("result").innerText = "";

    document.getElementById("nextBtn").style.display = "none";
}

//check if answer is correct
function checkAnswer(answer) {
    let correct =
    questions[current].correct;
    if (answer === correct) {

        document.getElementById("result").innerHTML = "Correct &#10004; &#128515;";
        document.getElementById("result").style.color = "#0251b8";
        document.getElementById("result").style.textAlign = "center";
        document.getElementById("result").style.fontSize = "25px";
        score++;
} else {
    document.getElementById("result").innerHTML = "Wrong &#10060; &#128532;";
    document.getElementById("result").style.color = "orangered";
    document.getElementById("result").style.textAlign = "center";
    document.getElementById("result").style.fontSize = "25px";
}

document.getElementById("nextBtn").style.display = "block";
}
//show next question
function nextQuestion() {
    current++;
    if (current < questions.length) {
        showQuestion();
    } else {
        document.getElementById("quiz").innerHTML = 
        "<h2>You scored " + score + " out of " + questions.length + "!</h2>" + "<button class='btn' onclick='restartQuiz()'>Play Again</button>";


    }
}

//restart quiz function
function restartQuiz() {
    current = 0;
    score = 0;

    //reset the quiz HTML back to original layout

    document.getElementById("quiz").innerHTML = `

         <progress id="stepProgress" value="1" max="16"></progress>
        <p id="stepText">Question 1 of 16</p>
    <p id="question">Question</p>

        <button class="btn" onclick="checkAnswer('A')">A</button>
        <button class="btn" onclick="checkAnswer('B')">B</button>
        <button class="btn" onclick="checkAnswer('C')">C</button>
        <button class="btn" onclick="checkAnswer('D')">D</button>

        <P id="result"></P>

        <button id="nextBtn" onclick="nextQuestion()">Next</button>`;

        //show the first question again
        showQuestion();
}


    </script>

     </script>
     <script>
            const stepProgress = document.getElementById("stepProgress");
            const stepText = document.getElementById("stepText");
            const nextBtn = document.getElementById("nextBtn");

            nextBtn.addEventListener('click', () => {
                if(stepProgress.value < stepProgress.max) {
                    stepProgress.value++;
                    stepText.textContent = `Question ${stepProgress.value} of ${stepProgress.max}`;
                }
            });
        </script>
